<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Gradient Background -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="neonBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f3ff"/>
      <stop offset="100%" style="stop-color:#0077b6"/>
    </linearGradient>
    <linearGradient id="neonPurple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#bc13fe"/>
      <stop offset="100%" style="stop-color:#7b2cbf"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="50" cy="50" r="48" fill="url(#bgGradient)" stroke="url(#neonBlue)" stroke-width="2"/>
  
  <!-- SD Letters Monogram -->
  <g filter="url(#glow)">
    <!-- Letter S -->
    <path d="M 30 35 L 45 35 L 45 42 L 35 42 L 35 48 L 45 48 L 45 55 L 30 55 Z" 
          fill="url(#neonBlue)" opacity="0.9"/>
    
    <!-- Letter D -->
    <path d="M 50 35 L 65 35 L 68 38 L 68 52 L 65 55 L 50 55 Z M 55 40 L 55 50 L 63 50 L 63 40 Z" 
          fill="url(#neonPurple)" opacity="0.9"/>
  </g>
  
  <!-- Decorative Circuit Lines -->
  <g stroke="url(#neonBlue)" stroke-width="1" opacity="0.5">
    <line x1="20" y1="20" x2="30" y2="30"/>
    <line x1="70" y1="20" x2="60" y2="30"/>
    <line x1="20" y1="80" x2="30" y2="70"/>
    <line x1="70" y1="80" x2="60" y2="70"/>
    <circle cx="20" cy="20" r="2" fill="url(#neonBlue)"/>
    <circle cx="80" cy="20" r="2" fill="url(#neonPurple)"/>
    <circle cx="20" cy="80" r="2" fill="url(#neonPurple)"/>
    <circle cx="80" cy="80" r="2" fill="url(#neonBlue)"/>
  </g>
  
  <!-- Outer Glow Ring -->
  <circle cx="50" cy="50" r="45" fill="none" stroke="url(#neonPurple)" stroke-width="1" opacity="0.3" stroke-dasharray="5,5">
    <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="20s" repeatCount="indefinite"/>
  </circle>
</svg>
